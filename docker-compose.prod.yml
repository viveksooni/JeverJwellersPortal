services:

  # ── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jever_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jever_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express API Server ────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: jever_server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: ${PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PUBLIC_URL: ${PUBLIC_URL}
      SHOP_NAME: ${SHOP_NAME:-Jever Jwellers}
      SHOP_ADDRESS: ${SHOP_ADDRESS:-}
      SHOP_PHONE: ${SHOP_PHONE:-}
      SHOP_EMAIL: ${SHOP_EMAIL:-}
      SHOP_GSTIN: ${SHOP_GSTIN:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "127.0.0.1:3001:3001"   # only accessible from localhost (system nginx)
    networks:
      - jever_net
    depends_on:
      postgres:
        condition: service_healthy

  # ── React Admin Frontend ──────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: jever_admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"     # only accessible from localhost (system nginx)
    networks:
      - jever_net
    depends_on:
      - server

networks:
  jever_net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
