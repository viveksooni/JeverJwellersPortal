services:
  postgres:
    image: postgres:16-alpine
    container_name: jever_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jever_user
      POSTGRES_PASSWORD: jever_pass
      POSTGRES_DB: jever_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jever_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jever.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
