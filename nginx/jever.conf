# ─── Jever Jwellers — Nginx Config ───────────────────────────────────────────
# Place this file at: /etc/nginx/sites-available/jever
# Enable with: sudo ln -s /etc/nginx/sites-available/jever /etc/nginx/sites-enabled/

# Admin Panel — admin.yourdomain.com
server {
    listen 80;
    server_name admin.yourdomain.com;

    # Redirect HTTP → HTTPS (uncomment after setting up Certbot)
    # return 301 https://$host$request_uri;

    root /var/www/jever/apps/admin/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# API + File Uploads — api.yourdomain.com
server {
    listen 80;
    server_name api.yourdomain.com;

    # return 301 https://$host$request_uri;

    client_max_body_size 50M;

    # Reverse proxy to Express
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;  # Allow time for Puppeteer PDF generation
    }

    # Serve uploaded files directly via Nginx (faster than Express)
    location /uploads/ {
        alias /var/www/jever/apps/server/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "https://admin.yourdomain.com";
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
    }
}

